# .github/workflows/snake.yml
#
# Generates an animated "snake" that eats your GitHub contribution graph
# and publishes the output (SVG + GIF) to the `output` branch of this repo.
#
# Setup:
#   1. Put this file at: .github/workflows/snake.yml
#   2. Push it to your default branch (main).
#   3. Go to the "Actions" tab and run "Generate Snake" once manually
#      (or just wait for the schedule / next push).
#   4. After it runs, an "output" branch will be created with the generated files.
#   5. Embed it in your profile README (see snippet at the bottom of this file).

name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # every day at midnight UTC
  push:
    branches:
      - main
  workflow_dispatch: {}    # allows manual "Run workflow" button

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate the gold snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23F5D876&color_dots=%231A1F2B,%234A3C17,%238A6A24,%23CF9C3A,%23F5D876&color_background=%2305070C
            dist/github-contribution-grid-snake.gif?color_snake=%23F5D876&color_dots=%231A1F2B,%234A3C17,%238A6A24,%23CF9C3A,%23F5D876&color_background=%2305070C

      - name: Push output to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ---------------------------------------------------------------------------
# Embed this in your profile README.md (replace <your-username>):
#
# ![snake gif](https://raw.githubusercontent.com/<your-username>/<your-username>/output/github-contribution-grid-snake.gif)
#
# For a crisp SVG version instead of the gif:
#
# ![snake svg](https://raw.githubusercontent.com/<your-username>/<your-username>/output/github-contribution-grid-snake.svg)
#
# Color reference used above (fully gold snake, dark/gold dot palette,
# matching the "Contribution Snake" card):
#   snake color:        #F5D876  (bright gold)
#   background:         #05070C  (near-black)
#   dots, 0 contrib:     #1A1F2B  (empty cell / dark slate)
#   dots, low:           #4A3C17  (deep bronze)
#   dots, mid:           #8A6A24  (antique gold)
#   dots, high:          #CF9C3A  (amber gold)
#   dots, highest:       #F5D876  (bright gold, same as snake)
# ---------------------------------------------------------------------------
